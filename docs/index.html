<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computer Game Development - Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(15, 23, 42, 0.7);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --primary-2: #818cf8;
      --success: #22c55e;
      --border: rgba(148, 163, 184, 0.25);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Kanit", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% 10%, #1d4ed8 0%, transparent 40%),
        radial-gradient(1000px 500px at 90% 90%, #7c3aed 0%, transparent 45%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 36px 32px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(120deg, rgba(56,189,248,0.15), rgba(129,140,248,0.15));
    }

    .title {
      margin: 0;
      font-size: clamp(1.6rem, 2.5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
    }

    .labs {
      list-style: none;
      margin: 0;
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .lab-item a,
    .lab-item .disabled {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      background: rgba(15, 23, 42, 0.55);
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }

    .lab-item a:hover {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.7);
      background: rgba(30, 41, 59, 0.9);
    }

    .lab-name {
      font-size: 1.05rem;
      font-weight: 500;
    }

    .badge {
      font-size: 0.8rem;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    .badge-live {
      color: #052e16;
      background: var(--success);
      border-color: #86efac;
      font-weight: 600;
    }

    .badge-soon {
      color: var(--muted);
      background: rgba(148, 163, 184, 0.12);
      border-color: rgba(148, 163, 184, 0.25);
    }

    .footer {
      text-align: center;
      padding: 14px 20px 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .header { padding: 28px 20px 18px; }
      .labs { padding: 14px; }
      .lab-item a, .lab-item .disabled { padding: 14px 14px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="header">
      <h1 class="title">ผลงานรายวิชา Computer Game Development</h1>
      <p class="subtitle">โดย นาย ปปปปปปป  รหัส 68000000-1</p>
    </header>

    <ul class="labs">
      <li class="lab-item">
        <a href="lab1.html">
          <span class="lab-name">Lab 1: แนะนำตัวเอง</span>
          <span class="badge badge-live">เปิดดูได้</span>
        </a>
      </li>
      <li class="lab-item">
        <div class="disabled">
          <span class="lab-name">Lab 2</span>
          <span class="badge badge-soon">ยังไม่เพิ่มลิงก์</span>
        </div>
      </li>
      <li class="lab-item">
        <div class="disabled">
          <span class="lab-name">Lab 3</span>
          <span class="badge badge-soon">ยังไม่เพิ่มลิงก์</span>
        </div>
      </li>
      <li class="lab-item">
        <div class="disabled">
          <span class="lab-name">Lab 4</span>
          <span class="badge badge-soon">ยังไม่เพิ่มลิงก์</span>
        </div>
      </li>
      <li class="lab-item">
        <div class="disabled">
          <span class="lab-name">Lab 5</span>
          <span class="badge badge-soon">ยังไม่เพิ่มลิงก์</span>
        </div>
      </li>
      <li class="lab-item">
        <div class="disabled">
          <span class="lab-name">Lab 6</span>
          <span class="badge badge-soon">ยังไม่เพิ่มลิงก์</span>
        </div>
      </li>
    </ul>

    <footer class="footer">
      © 2026 Computer Game Development Portfolio
    </footer>
  </main>
</body>
</html>
